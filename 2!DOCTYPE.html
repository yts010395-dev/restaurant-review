
 <!DOCTYPE html>
 <html lang="ko">
 <head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>영수증 리뷰 작성 안내</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      line-height: 1.6;
      background-color: #f9f9f9;
    }
    
    h2 {
      font-size: 16px;
      color: #888;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #333;
    }
    
    .intro-text {
      margin-bottom: 24px;
      color: #555;
      font-size: 15px;
    }
    
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    
    .btn {
      display: block;
      padding: 16px;
      text-align: center;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }
    
    .btn-primary {
      background: #03c75a;
      color: white;
    }
    
    .btn-primary:hover {
      background: #02b84d;
      box-shadow: 0 4px 12px rgba(3, 199, 90, 0.3);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #03c75a;
      border: 2px solid #03c75a;
    }
    
    .btn-secondary:hover {
      background: #e8f5e9;
    }
    
    .fallback-text {
      font-size: 14px;
      color: #999;
      margin-bottom: 12px;
      text-align: center;
    }
    
    hr {
      margin: 32px 0;
      border: none;
      border-top: 1px solid #e0e0e0;
    }
    
    h3 {
      font-size: 16px;
      margin-bottom: 20px;
      color: #333;
    }
    
    .review-guide {
      background: #fafafa;
      padding: 16px;
      border-radius: 8px;
      border-left: 4px solid #03c75a;
    }
    
    .review-guide p {
      margin-bottom: 12px;
      font-size: 14px;
      color: #555;
      line-height: 1.8;
    }
    
    .review-guide p:last-child {
      margin-bottom: 0;
    }
    
    strong {
      color: #333;
      display: block;
      margin-bottom: 4px;
    }
  </style>
 </head>
<body>
   <h2>고가빈커리하우스 광화문</h2>
   <h1>영수증 리뷰 작성 안내</h1>
 
  <p class="intro-text">아래 버튼을 눌러 네이버 영수증 리뷰를 작성해주세요.</p>
 
  <div class="button-group">
    <a
      href="naversearchapp://inappbrowser?url=https%3A%2F%2Fm.place.naver.com%2Fmy%2Fcheckin&target=new&version=6"
      class="btn btn-primary"
    >
      네이버앱에서 리뷰 작성하기
    </a>
 
    <p class="fallback-text">버튼이 열리지 않으면 아래 링크를 눌러주세요.</p>
 
    <a href="https://m.place.naver.com/my/checkin" class="btn btn-secondary">
      일반 브라우저로 리뷰 작성하기
    </a>
  </div>
 
   <hr />
 
   <h3>리뷰에 아래 내용을 넣어주시면 더 큰 도움이 됩니다.</h3>
  <div class="review-guide">
    <p><strong>1. 누구와 방문하셨나요?</strong>직장 동료와 점심 / 혼밥 / 데이트 / 친구 모임</p>
    <p><strong>2. 어떤 메뉴를 드셨나요?</strong>치킨 커리 / 비프 커리 / 새우 커리 / 토핑 추가</p>
    <p><strong>3. 어떤 점이 좋았나요?</strong>진한 커리 맛 / 든든한 한 끼 / 깔끔한 매장 / 혼밥하기 편함</p>
  </div>
 </body>
 </html>
